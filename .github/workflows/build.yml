name: Build Reynard IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app || true
          xcodebuild -version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Homebrew packages
        run: |
          brew update
          brew install ldid ccache

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Gecko Sources
        uses: actions/cache@v4
        with:
          path: |
            gecko-dev
            ~/.mozbuild
            ~/.cargo
            ~/Library/Caches/Homebrew
          key: gecko-${{ runner.os }}-${{ hashFiles('tools/development/**') }}
          restore-keys: |
            gecko-${{ runner.os }}-

      - name: Make scripts executable
        run: |
          chmod +x tools/development/*.sh
          chmod +x tools/release/*.sh

      - name: Download Gecko
        run: |
          zsh tools/development/update-gecko.sh

      - name: Apply Korean Patch
        run: |
          zsh tools/development/apply-patches.sh

      - name: Build Gecko
        run: |
          ./tools/development/build-gecko.sh

      - name: Build App
        run: |
          ./tools/release/build-app.sh

      - name: Create IPA
        run: |
          ./tools/release/create-ipa.sh

      - name: Find IPA
        run: |
          find . -name "*.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-IPA
          path: |
            **/*.ipa
          if-no-files-found: error

      - name: Upload XCArchive
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XCArchive
          path: |
            **/*.xcarchive
          if-no-files-found: ignore

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildLogs
          path: |
            **/*.log
            ~/Library/Logs/**
          if-no-files-found: ignore
